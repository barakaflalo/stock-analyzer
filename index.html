<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockAI — Smart Stock Analysis</title>
<meta name="description" content="AI-powered stock analysis for US & Israel markets">
<meta name="theme-color" content="#0e0e0e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+Hebrew:wght@300;400;700&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
/* DARK THEME */
:root{
  --gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#8a6d2f;
  --bg:#050505;--bg2:#0e0e0e;--bg3:#161616;--bg4:#1e1e1e;
  --border:#2a2416;--text:#d4c5a0;--text-dim:#6b5e3e;--text-muted:#3a3020;
  --green:#4caf72;--red:#cf4a4a;--yellow:#c9a84c;
  --overlay:rgba(0,0,0,.82);--card-shadow:0 4px 32px rgba(0,0,0,.6);
}
/* LIGHT THEME */
body.light{
  --bg:#f5f0e8;--bg2:#ffffff;--bg3:#f0ebe0;--bg4:#e8e0d0;
  --border:#d4c5a0;--text:#2a1f08;--text-dim:#6b5230;--text-muted:#a08050;
  --overlay:rgba(0,0,0,.5);--card-shadow:0 4px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Hebrew',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
body.rtl{direction:rtl;text-align:right;}
body.ltr{direction:ltr;text-align:left;}
body.ar-lang{font-family:'Noto Sans Arabic',sans-serif;}
body:not(.light)::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

/* SPLASH */
#splash{position:fixed;inset:0;background:#050505;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Playfair Display',serif;font-size:58px;font-weight:900;color:var(--gold);letter-spacing:-2px;}
.splash-tag{font-size:11px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.splash-bar{width:160px;height:2px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-top:8px;}
.splash-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;animation:splashLoad 1.4s ease forwards;}
@keyframes splashLoad{0%{width:0}100%{width:100%}}
.splash-dots{display:flex;gap:6px;margin-top:4px;}
.splash-dot{width:5px;height:5px;border-radius:50%;background:var(--gold-dim);animation:dotPulse 1.2s ease-in-out infinite;}
.splash-dot:nth-child(2){animation-delay:.2s;}.splash-dot:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* TICKER */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:32px;display:flex;align-items:center;position:relative;z-index:10;}
.ticker-track{display:flex;gap:0;animation:ticker 40s linear infinite;white-space:nowrap;}
.ticker-item{padding:0 28px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--gold-dim);letter-spacing:1px;}
.ticker-item span{color:var(--green);margin-right:4px;}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
.site-header{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:20px 24px 16px;position:relative;z-index:10;}
.header-inner{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.brand{display:flex;flex-direction:column;gap:4px;}
.brand-tag{font-size:9px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.brand-name{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,38px);font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px;}
.brand-sub{font-size:11px;color:var(--text-dim);letter-spacing:.5px;}
.header-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.header-top-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.lang-selector{display:flex;gap:5px;flex-wrap:wrap;}
.lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;text-transform:uppercase;}
.lang-btn:hover,.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:2px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--gold-dim);color:var(--gold);}
.header-bottom-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.btn-watchlist{background:var(--bg3);border:1px solid var(--gold-dim);color:var(--gold);padding:6px 14px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-watchlist:hover{background:rgba(201,168,76,.08);border-color:var(--gold);}
.watchlist-count{background:var(--gold);color:#000;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;}
.ai-status{display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--border);border-radius:2px;background:var(--bg3);font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.ai-status:hover{border-color:var(--gold-dim);}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .3s;}
.ai-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);}
.ai-name{max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:10;}

/* SEARCH */
.search-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:24px;margin-bottom:28px;position:relative;overflow:hidden;box-shadow:var(--card-shadow);}
.search-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.search-label{font-size:9px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:14px;display:block;font-family:'IBM Plex Mono',monospace;}
.search-row{display:flex;gap:8px;}
.search-input{flex:1;background:var(--bg);border:1px solid var(--border);padding:13px 16px;font-size:18px;font-family:'IBM Plex Mono',monospace;color:var(--text);letter-spacing:3px;text-transform:uppercase;outline:none;border-radius:2px;direction:ltr;text-align:left;transition:border-color .2s,box-shadow .2s;}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-dim);}
.search-input::placeholder{color:var(--text-muted);letter-spacing:1px;font-size:13px;}
.btn-analyze{background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;padding:13px 24px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:2px;color:#000;cursor:pointer;text-transform:uppercase;border-radius:2px;transition:opacity .2s,transform .2s;white-space:nowrap;}
.btn-analyze:hover{opacity:.85;transform:translateY(-1px);}
.btn-analyze:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.quick-picks{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.pick-btn{background:var(--bg);border:1px solid var(--text-muted);color:var(--text-dim);padding:4px 12px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .15s;}
.pick-btn:hover{border-color:var(--gold-dim);color:var(--gold);}

/* LOADING */
.loading-box{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:48px 28px;text-align:center;display:none;}
.loading-box.visible{display:block;}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 18px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-sym{font-size:20px;font-family:'IBM Plex Mono',monospace;color:var(--gold);letter-spacing:4px;margin-bottom:6px;}
.loading-steps{margin-top:16px;display:flex;flex-direction:column;gap:6px;align-items:center;}
.loading-step{font-size:11px;color:var(--text-muted);animation:blink 2.5s ease-in-out infinite;}
.loading-step:nth-child(2){animation-delay:.6s;}.loading-step:nth-child(3){animation-delay:1.2s;}.loading-step:nth-child(4){animation-delay:1.8s;}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* ERROR */
.error-box{background:rgba(207,74,74,.08);border:1px solid rgba(207,74,74,.3);border-radius:4px;padding:18px 22px;color:var(--red);font-size:13px;display:none;line-height:1.6;}
.error-box.visible{display:block;}

/* RESULT CARD */
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;display:none;animation:fadeUp .4s ease;box-shadow:var(--card-shadow);}
.result-card.visible{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.result-header{display:flex;justify-content:space-between;align-items:center;padding:24px 28px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:14px;}
.stock-id{display:flex;flex-direction:column;gap:3px;}
.stock-sym{font-size:34px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--text);letter-spacing:3px;}
.stock-fullname{font-size:12px;color:var(--text-dim);}
.result-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
.rec-badge{padding:10px 22px;border-radius:2px;font-size:16px;font-weight:700;border:2px solid;letter-spacing:1px;}
.rec-buy{color:var(--green);border-color:var(--green);background:rgba(76,175,114,.08);}
.rec-sell{color:var(--red);border-color:var(--red);background:rgba(207,74,74,.08);}
.rec-hold{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.08);}
.btn-add-watch{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .2s;letter-spacing:1px;}
.btn-add-watch:hover{border-color:var(--gold-dim);color:var(--gold);}
.btn-add-watch.added{border-color:var(--green);color:var(--green);}
.stale-bar{background:rgba(201,168,76,.06);border-bottom:1px solid var(--border);padding:8px 28px;display:none;align-items:center;justify-content:space-between;gap:8px;}
.stale-bar.visible{display:flex;}
.stale-text{font-size:11px;color:var(--gold-dim);font-family:'IBM Plex Mono',monospace;}
.btn-refresh{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:4px 12px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .2s;}
.btn-refresh:hover{background:rgba(201,168,76,.1);}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.metric-cell{background:var(--bg2);padding:16px 20px;}
.metric-label{font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:7px;font-family:'IBM Plex Mono',monospace;}
.metric-val{font-size:16px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text);}
.conf-section{padding:20px 28px;border-bottom:1px solid var(--border);}
.conf-row{display:flex;justify-content:space-between;margin-bottom:9px;font-size:11px;}
.conf-label{color:var(--text-dim);letter-spacing:2px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}
.conf-num{color:var(--gold);font-family:'IBM Plex Mono',monospace;font-weight:600;}
.conf-track{height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.conf-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-light));border-radius:3px;transition:width 1.2s cubic-bezier(.22,1,.36,1);width:0;}
.body-sec{padding:20px 28px;border-bottom:1px solid var(--border);}
.sec-label{font-size:9px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;font-family:'IBM Plex Mono',monospace;}
.summary-txt{font-size:13px;line-height:1.85;color:var(--text);}
.factors-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.factor-panel{background:var(--bg2);padding:20px 24px;}
.factor-item{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;font-size:12px;line-height:1.55;color:var(--text);}
.factor-dot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.signals-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--border);}
.signal-cell{background:var(--bg);padding:14px 16px;text-align:center;}
.signal-lbl{font-size:8px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
.signal-val{font-size:12px;font-weight:700;}
.sources-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.source-tag{background:var(--bg);border:1px solid var(--text-muted);padding:2px 10px;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);border-radius:2px;}

/* HISTORY */
.history-wrap{margin-top:24px;}
.history-title{font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
.history-items{display:flex;flex-wrap:wrap;gap:7px;}
.hist-item{background:var(--bg2);border:1px solid var(--border);padding:8px 12px;cursor:pointer;border-radius:2px;transition:border-color .2s;display:flex;flex-direction:column;gap:2px;}
.hist-item:hover{border-color:var(--gold-dim);}
.hist-sym{font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.hist-rec{font-size:9px;}
.hist-time{font-size:9px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}

/* SHARE */
.share-section{margin-top:28px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:relative;overflow:hidden;}
.share-section::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.share-label-txt{font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.share-btns{display:flex;gap:7px;flex-wrap:wrap;}
.btn-share{background:linear-gradient(135deg,var(--gold-dim),#5a4520);border:1px solid var(--gold-dim);color:var(--gold-light);padding:9px 18px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.btn-share:hover{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;}
.btn-more-apps{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:9px 18px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;}
.btn-more-apps:hover{border-color:var(--gold-dim);color:var(--gold);}
.disclaimer{margin-top:40px;border-top:1px solid var(--border);padding-top:16px;font-size:10px;color:var(--text-muted);line-height:1.8;text-align:center;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--gold-dim);color:var(--gold);padding:9px 20px;font-size:11px;font-family:'IBM Plex Mono',monospace;border-radius:2px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL BASE */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:500;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:6px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s;box-shadow:var(--card-shadow);}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:2;}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.modal-close{background:transparent;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:2px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{border-color:var(--gold-dim);color:var(--gold);}
.modal-body{padding:24px;}

/* AI SETUP */
.setup-intro{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:20px;padding:14px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:3px;}
.setup-intro strong{color:var(--gold);}
.ai-options{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.ai-option{background:var(--bg3);border:2px solid var(--border);border-radius:3px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.ai-option:hover{border-color:var(--gold-dim);}
.ai-option.selected{border-color:var(--gold);background:rgba(201,168,76,.06);}
.ai-option-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.ai-option-info{flex:1;}
.ai-option-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.ai-option-desc{font-size:11px;color:var(--text-dim);}
.ai-option-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;flex-shrink:0;}
.badge-free{background:rgba(76,175,114,.15);color:var(--green);border:1px solid rgba(76,175,114,.3);}
.badge-paid{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2);}
.badge-device{background:rgba(100,100,255,.1);color:#8888ff;border:1px solid rgba(100,100,255,.2);}
.key-area{display:none;margin-top:6px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:3px;}
.key-area.visible{display:block;}
.key-label{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
.key-input{width:100%;background:var(--bg3);border:1px solid var(--border);padding:10px 14px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text);outline:none;border-radius:2px;transition:border-color .2s;direction:ltr;}
.key-input:focus{border-color:var(--gold);}
.key-hint{font-size:11px;color:var(--text-dim);margin-top:8px;line-height:1.6;}
.key-hint a{color:var(--gold);text-decoration:none;}
.key-hint a:hover{text-decoration:underline;}
.key-hint-steps{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.key-step{font-size:11px;color:var(--text-muted);display:flex;gap:8px;line-height:1.5;}
.key-step-num{color:var(--gold-dim);font-family:'IBM Plex Mono',monospace;flex-shrink:0;font-weight:700;}
.device-ai-info{font-size:12px;color:var(--text);line-height:1.6;}
.btn-setup-save{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;padding:13px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:2px;color:#000;cursor:pointer;border-radius:2px;transition:all .2s;margin-top:16px;text-transform:uppercase;}
.btn-setup-save:hover{opacity:.88;}
.guide-note-inline{background:rgba(76,175,114,.06);border:1px solid rgba(76,175,114,.2);border-radius:3px;padding:10px 14px;font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:8px;}

/* GUIDE */
.guide-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.guide-tab{flex:1;min-width:70px;padding:10px 6px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;text-align:center;white-space:nowrap;}
.guide-tab:hover{color:var(--text-dim);}
.guide-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.guide-pane{display:none;padding:20px 24px;}
.guide-pane.active{display:block;}
.guide-section{margin-bottom:22px;}
.guide-section-title{font-size:10px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace;padding-bottom:6px;border-bottom:1px solid var(--border);}
.guide-item{display:flex;gap:10px;margin-bottom:10px;font-size:12px;color:var(--text);line-height:1.65;}
.guide-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center;margin-top:1px;}
.guide-text strong{color:var(--gold);}
.guide-step{display:flex;gap:10px;margin-bottom:12px;font-size:12px;line-height:1.65;}
.guide-step-num{background:var(--gold-dim);color:#000;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;margin-top:1px;}
.guide-step-text{color:var(--text);}
.guide-step-text strong{color:var(--gold);}
.guide-step-text a{color:var(--gold);text-decoration:none;}
.guide-step-text a:hover{text-decoration:underline;}
.guide-note{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:3px;padding:10px 14px;font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:8px;}

/* WATCHLIST PANEL */
.watch-overlay{position:fixed;inset:0;background:var(--overlay);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.watch-overlay.open{opacity:1;pointer-events:all;}
.watch-panel{position:fixed;top:0;right:0;height:100%;width:min(420px,100vw);background:var(--bg2);border-left:1px solid var(--border);z-index:201;transform:translateX(110%);transition:transform .35s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--card-shadow);}
body.ltr .watch-panel{right:auto;left:0;border-left:none;border-right:1px solid var(--border);transform:translateX(-110%);}
.watch-panel.open{transform:translateX(0);}
.watch-panel-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg3);flex-shrink:0;}
.watch-panel-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);}
.watch-close{background:transparent;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:2px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.watch-close:hover{border-color:var(--gold-dim);color:var(--gold);}
.watch-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.watch-tab{flex:1;padding:10px 6px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;text-align:center;}
.watch-tab:hover{color:var(--text-dim);}
.watch-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.04);}
.watch-body{flex:1;overflow-y:auto;}
.watch-body::-webkit-scrollbar{width:3px;}
.watch-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.tab-pane{display:none;padding:18px;}
.tab-pane.active{display:block;}
.watch-add-row{display:flex;gap:7px;margin-bottom:14px;}
.watch-add-input{flex:1;background:var(--bg);border:1px solid var(--border);padding:9px 12px;font-size:14px;font-family:'IBM Plex Mono',monospace;color:var(--text);letter-spacing:2px;text-transform:uppercase;outline:none;border-radius:2px;direction:ltr;}
.watch-add-input:focus{border-color:var(--gold);}
.watch-add-btn{background:var(--gold-dim);border:none;color:#000;padding:9px 14px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:700;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.watch-add-btn:hover{background:var(--gold);}
.watch-items-list{display:flex;flex-direction:column;gap:5px;}
.watch-item{background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:7px;transition:border-color .15s;}
.watch-item:hover{border-color:var(--gold-dim);}
.watch-item-left{display:flex;flex-direction:column;gap:2px;flex:1;}
.watch-item-sym{font-size:14px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--text);cursor:pointer;}
.watch-item-sym:hover{color:var(--gold);}
.watch-item-age{font-size:9px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
.watch-item-actions{display:flex;gap:5px;}
.btn-analyze-watch{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:4px 10px;font-size:9px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .15s;letter-spacing:1px;}
.btn-analyze-watch:hover{background:var(--gold-dim);color:#000;}
.btn-remove-watch{background:transparent;border:1px solid rgba(207,74,74,.3);color:var(--red);width:24px;height:24px;font-size:13px;cursor:pointer;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.btn-remove-watch:hover{background:rgba(207,74,74,.1);}
.watch-empty{text-align:center;padding:36px 16px;color:var(--text-muted);font-size:12px;line-height:1.8;}
.watch-empty-icon{font-size:28px;margin-bottom:10px;opacity:.4;}
.btn-analyze-all{width:100%;background:linear-gradient(135deg,var(--gold-dim),#3a2a10);border:1px solid var(--gold-dim);color:var(--gold-light);padding:10px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:all .2s;margin-bottom:12px;text-transform:uppercase;}
.btn-analyze-all:hover{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;}
.btn-analyze-all:disabled{opacity:.4;cursor:not-allowed;}
.watch-backup-row{display:flex;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.btn-backup{flex:1;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px;font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;text-align:center;}
.btn-backup:hover{border-color:var(--gold-dim);color:var(--gold);}
.preset-grid{display:flex;flex-direction:column;gap:5px;}
.preset-item{background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:7px;transition:border-color .15s;}
.preset-item:hover{border-color:var(--gold-dim);}
.preset-sym{font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--text);}
.preset-name{font-size:10px;color:var(--text-dim);flex:1;margin:0 8px;}
.preset-actions{display:flex;gap:5px;}
.btn-preset-analyze{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:3px 9px;font-size:9px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .15s;}
.btn-preset-analyze:hover{background:var(--gold-dim);color:#000;}
.btn-preset-add{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:3px 9px;font-size:9px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .15s;}
.btn-preset-add:hover{border-color:var(--green);color:var(--green);}
.btn-preset-add.added{border-color:var(--green);color:var(--green);}
.all-results-wrap{margin-top:10px;}
.all-result-row{background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:7px;cursor:pointer;transition:border-color .15s;}
.all-result-row:hover{border-color:var(--gold-dim);}
.all-result-sym{font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--text);min-width:55px;}
.all-result-rec{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.all-result-conf{font-size:10px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
.all-result-loading{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;animation:blink 1.5s ease-in-out infinite;}

/* PWA BANNER */
.pwa-banner{background:linear-gradient(135deg,rgba(201,168,76,.08),var(--bg));border:1px solid var(--gold-dim);border-radius:4px;padding:12px 16px;margin-bottom:18px;display:none;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.pwa-banner.visible{display:flex;}
.pwa-banner-text{font-size:12px;color:var(--text);line-height:1.5;}
.pwa-banner-text strong{color:var(--gold);}
.btn-pwa-install{background:var(--gold-dim);border:none;color:#000;padding:7px 16px;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;}
.btn-pwa-install:hover{background:var(--gold);}
.btn-pwa-dismiss{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:7px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;}

/* RESPONSIVE */
@media(max-width:520px){

  .share-section{flex-direction:column;align-items:flex-start;}

  .header-top-row,.header-bottom-row{justify-content:flex-start;}
}

function renderSetup(){
  var lang=SETUP_CONTENT[curLang]?curLang:'en';
  var s=SETUP_CONTENT[lang];
  var cfg=loadAIConfig();
  var savedVals={
    claude:cfg.claudeKey||'',openai:cfg.openaiKey||'',
    gemini:cfg.geminiKey||'',device:cfg.deviceUrl||'http://localhost:11434/v1',
    customUrl:cfg.customUrl||'',customKey:cfg.customKey||''
  };
  var html='<div class="setup-intro">'+s.intro+'</div>';
  html+='<div class="ai-options">';
  s.providers.forEach(function(p){
    html+='<div class="ai-option'+(selectedAI===p.id?' selected':'')+'" id="opt-'+p.id+'" onclick="selectAI(\''+p.id+'\')">'
      +'<div class="ai-option-icon">'+p.icon+'</div>'
      +'<div class="ai-option-info"><div class="ai-option-name">'+p.name+'</div><div class="ai-option-desc">'+p.desc+'</div></div>'
      +'<span class="ai-option-badge '+p.badgeClass+'">'+p.badge+'</span>'
      +'</div>';
  });
  html+='</div>';
  // Key areas
  ['claude','openai','gemini'].forEach(function(id){
    var a=s.areas[id];
    html+='<div class="key-area'+(selectedAI===id?' visible':'')+'" id="area-'+id+'">'
      +'<div class="key-label">'+a.label+'</div>'
      +'<input type="password" class="key-input" id="key-'+id+'" placeholder="'+a.ph+'" value="'+escHtml(savedVals[id])+'">'
      +'<div class="key-hint"><div class="key-hint-steps">';
    a.steps.forEach(function(step,n){html+='<div class="key-step"><span class="key-step-num">'+(n+1)+'</span><span>'+step+'</span></div>';});
    html+='</div>';
    if(a.note)html+='<div class="guide-note-inline" style="margin-top:10px;">'+a.note+'</div>';
    html+='</div></div>';
  });
  // Device area
  var da=s.areas.device;
  html+='<div class="key-area'+(selectedAI==='device'?' visible':'')+'" id="area-device">'
    +'<div class="device-ai-info">'
    +'<strong style="color:var(--gold)">'+da.title+'</strong><br><br>'+da.info
    +'<div class="key-hint-steps" style="margin-top:12px;">';
  da.steps.forEach(function(step,n){html+='<div class="key-step"><span class="key-step-num">'+(n+1)+'</span><span>'+step+'</span></div>';});
  html+='</div><div style="margin-top:14px;">'
    +'<div class="key-label">'+da.urlLabel+'</div>'
    +'<input type="text" class="key-input" id="key-device" value="'+escHtml(savedVals.device)+'">'
    +'<div class="key-hint" style="margin-top:6px;">'+da.urlHint+'</div>'
    +'</div></div></div>';
  // Custom area
  var ca=s.areas.custom;
  html+='<div class="key-area'+(selectedAI==='custom'?' visible':'')+'" id="area-custom">'
    +'<div class="key-label">'+ca.label1+'</div>'
    +'<input type="text" class="key-input" id="key-custom-url" placeholder="'+ca.ph1+'" value="'+escHtml(savedVals.customUrl)+'" style="margin-bottom:10px;">'
    +'<div class="key-label">'+ca.label2+'</div>'
    +'<input type="password" class="key-input" id="key-custom" placeholder="'+ca.ph2+'" value="'+escHtml(savedVals.customKey)+'">'
    +'<div class="key-hint" style="margin-top:6px;">'+ca.hint+'</div>'
    +'</div>';
  html+='<button class="btn-setup-save" onclick="saveAISetup()">'+s.saveBtn+'</button>';
  document.getElementById('setupModalBody').innerHTML=html;
}
var selectedAI=null;
function loadAIConfig(){
  return{
    provider:localStorage.getItem('stockai_ai_provider'),
    claudeKey:localStorage.getItem('stockai_key_claude'),
    openaiKey:localStorage.getItem('stockai_key_openai'),
    geminiKey:localStorage.getItem('stockai_key_gemini'),
    deviceUrl:localStorage.getItem('stockai_device_url')||'http://localhost:11434/v1',
    customUrl:localStorage.getItem('stockai_custom_url'),
    customKey:localStorage.getItem('stockai_key_custom')
  };
}
function updateAIStatus(){
  var cfg=loadAIConfig();
  var dot=document.getElementById('aiDot');
  var nameEl=document.getElementById('aiStatusName');
  var names={claude:'Claude',openai:'ChatGPT',gemini:'Gemini',device:'On-Device',custom:'Custom'};
  if(cfg.provider){dot.classList.add('connected');nameEl.textContent=names[cfg.provider]||cfg.provider;}
  else{dot.classList.remove('connected');nameEl.textContent=T('aiNotConnected');}
}
function openSetup(){
  var cfg=loadAIConfig();
  selectedAI=cfg.provider||null;
  renderSetup();
  document.getElementById('setupOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSetup(){document.getElementById('setupOverlay').classList.remove('open');document.body.style.overflow='';}
function selectAI(provider){
  selectedAI=provider;
  document.querySelectorAll('.ai-option').forEach(function(o){o.classList.remove('selected');});
  document.querySelectorAll('.key-area').forEach(function(a){a.classList.remove('visible');});
  var opt=document.getElementById('opt-'+provider);if(opt)opt.classList.add('selected');
  var area=document.getElementById('area-'+provider);if(area)area.classList.add('visible');
}
function saveAISetup(){
  if(!selectedAI){showToastMsg('Please select an AI provider');return;}
  localStorage.setItem('stockai_ai_provider',selectedAI);
  if(selectedAI==='claude'){
    var k=document.getElementById('key-claude').value.trim();
    if(!k){showToastMsg('Please enter your Claude API key');return;}
    localStorage.setItem('stockai_key_claude',k);
  }else if(selectedAI==='openai'){
    var k=document.getElementById('key-openai').value.trim();
    if(!k){showToastMsg('Please enter your OpenAI API key');return;}
    localStorage.setItem('stockai_key_openai',k);
  }else if(selectedAI==='gemini'){
    var k=document.getElementById('key-gemini').value.trim();
    if(!k){showToastMsg('Please enter your Gemini API key');return;}
    localStorage.setItem('stockai_key_gemini',k);
  }else if(selectedAI==='device'){
    var u=document.getElementById('key-device').value.trim()||'http://localhost:11434/v1';
    localStorage.setItem('stockai_device_url',u);
  }else if(selectedAI==='custom'){
    localStorage.setItem('stockai_custom_url',document.getElementById('key-custom-url').value.trim());
    localStorage.setItem('stockai_key_custom',document.getElementById('key-custom').value.trim());
  }
  updateAIStatus();closeSetup();showToastMsg('✓ AI connected!');
}

var currentGuideTab='app';
var GUIDE_KEYS=['app','claude','openai','gemini','device'];

function renderGuide(){
  var lang=GUIDE_CONTENT[curLang]?curLang:'en';
  var g=GUIDE_CONTENT[lang];
  var tabsEl=document.getElementById('guideTabs');
  var panesEl=document.getElementById('guidePanes');
  // Build tabs
  tabsEl.innerHTML='';
  GUIDE_KEYS.forEach(function(key,i){
    var btn=document.createElement('button');
    btn.className='guide-tab'+(key===currentGuideTab?' active':'');
    btn.setAttribute('id','gtab-'+key);
    btn.textContent=g.tabs[i]||key;
    btn.onclick=(function(k){return function(){switchGuideTab(k);};})(key);
    tabsEl.appendChild(btn);
  });
  // Build panes
  panesEl.innerHTML='';
  GUIDE_KEYS.forEach(function(key){
    var data=g[key];if(!data)return;
    var pane=document.createElement('div');
    pane.className='guide-pane'+(key===currentGuideTab?' active':'');
    pane.id='gpane-'+key;
    var html='';
    (data.sections||[]).forEach(function(sec){
      html+='<div class="guide-section"><div class="guide-section-title">'+sec.title+'</div>';
      if(sec.items){sec.items.forEach(function(item){html+='<div class="guide-item"><div class="guide-icon">'+item.icon+'</div><div class="guide-text">'+item.html+'</div></div>';});}
      if(sec.steps){sec.steps.forEach(function(step,n){html+='<div class="guide-step"><div class="guide-step-num">'+(n+1)+'</div><div class="guide-step-text">'+step+'</div></div>';});}
      html+='</div>';
    });
    if(data.note)html+='<div class="guide-note">'+data.note+'</div>';
    pane.innerHTML=html;
    panesEl.appendChild(pane);
  });
}

function openGuide(){
  currentGuideTab='app';
  renderGuide();
  document.getElementById('guideOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeGuide(){document.getElementById('guideOverlay').classList.remove('open');document.body.style.overflow='';}
function switchGuideTab(tab){
  currentGuideTab=tab;
  document.querySelectorAll('.guide-tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.guide-pane').forEach(function(p){p.classList.remove('active');});
  var tb=document.getElementById('gtab-'+tab);if(tb)tb.classList.add('active');
  var pn=document.getElementById('gpane-'+tab);if(pn)pn.classList.add('active');
}

function loadWatchlist(){try{return JSON.parse(localStorage.getItem('stockai_watchlist'))||[];}catch(e){return[];}}
function saveWatchlist(list){localStorage.setItem('stockai_watchlist',JSON.stringify(list));updateWatchCount();}
function updateWatchCount(){document.getElementById('watchCount').textContent=loadWatchlist().length;}
function isInWatchlist(sym){return loadWatchlist().indexOf(sym)!==-1;}
function addToWatchlist(sym){
  var s=sym||(document.getElementById('watchAddInput').value.trim().toUpperCase());
  if(!s)return;
  var list=loadWatchlist();
  if(list.indexOf(s)===-1){list.push(s);saveWatchlist(list);}
  document.getElementById('watchAddInput').value='';
  renderWatchlist();updateAddWatchBtn();showToastMsg('✓ '+s);
}
function removeFromWatchlist(sym){
  saveWatchlist(loadWatchlist().filter(function(x){return x!==sym;}));
  renderWatchlist();updateAddWatchBtn();
}
function toggleWatchFromResult(){
  var sym=document.getElementById('rSym').textContent;if(!sym)return;
  if(isInWatchlist(sym))removeFromWatchlist(sym);else addToWatchlist(sym);
  updateAddWatchBtn();
}
function updateAddWatchBtn(){
  var sym=document.getElementById('rSym').textContent;
  var btn=document.getElementById('btnAddWatch');if(!sym||!btn)return;
  if(isInWatchlist(sym)){btn.textContent=T('addedToWatch');btn.className='btn-add-watch added';}
  else{btn.textContent=T('addToWatch');btn.className='btn-add-watch';}
}
function renderWatchlist(){
  var list=loadWatchlist();
  var el=document.getElementById('watchItemsList');
  document.querySelectorAll('[data-t]').forEach(function(e){e.textContent=T(e.getAttribute('data-t'));});
  document.querySelectorAll('[data-tp]').forEach(function(e){e.placeholder=T(e.getAttribute('data-tp'));});
  document.getElementById('watchPanelTitle').textContent=T('watchPanelTitle');
  if(!list.length){
    el.innerHTML='<div class="watch-empty"><div class="watch-empty-icon">'+T('watchEmptyIcon')+'</div>'+T('watchEmpty').replace('\n','<br>')+'</div>';
    document.getElementById('btnAnalyzeAll').disabled=true;return;
  }
  document.getElementById('btnAnalyzeAll').disabled=false;
  el.innerHTML='';
  var cache=getAnalysisCache();
  list.forEach(function(sym){
    var entry=cache[sym];
    var ageStr=entry&&entry.ts?formatAge(entry.ts):'';
    var d=document.createElement('div');d.className='watch-item';
    d.innerHTML='<div class="watch-item-left">'
      +'<div class="watch-item-sym" onclick="analyzeFromWatch(\''+sym+'\')">'+sym+'</div>'
      +(ageStr?'<div class="watch-item-age">'+T('staleMsg').replace('{ago}',ageStr)+'</div>':'')
      +'</div><div class="watch-item-actions">'
      +'<button class="btn-analyze-watch" onclick="analyzeFromWatch(\''+sym+'\')">'+T('analyzeBtn')+'</button>'
      +'<button class="btn-remove-watch" onclick="removeFromWatchlist(\''+sym+'\')">✕</button>'
      +'</div>';
    el.appendChild(d);
  });
  renderPresetList('israelList',ISRAEL_STOCKS);
  renderPresetList('usList',US_STOCKS);
}
function renderPresetList(elId,stocks){
  var el=document.getElementById(elId);var list=loadWatchlist();el.innerHTML='';
  stocks.forEach(function(s){
    var inList=list.indexOf(s.sym)!==-1;
    var d=document.createElement('div');d.className='preset-item';
    d.innerHTML='<div class="preset-sym">'+s.sym+'</div><div class="preset-name">'+s.name+'</div>'
      +'<div class="preset-actions">'
      +'<button class="btn-preset-analyze" onclick="analyzeFromWatch(\''+s.sym+'\')">'+T('analyzeBtn')+'</button>'
      +'<button class="btn-preset-add'+(inList?' added':'')+'" onclick="togglePreset(\''+s.sym+'\')">'+(inList?T('addedToWatch'):T('addToWatch'))+'</button>'
      +'</div>';
    el.appendChild(d);
  });
}
function togglePreset(sym){if(isInWatchlist(sym))removeFromWatchlist(sym);else addToWatchlist(sym);renderWatchlist();}
function openWatchPanel(){renderWatchlist();document.getElementById('watchPanel').classList.add('open');document.getElementById('watchOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeWatchPanel(){document.getElementById('watchPanel').classList.remove('open');document.getElementById('watchOverlay').classList.remove('open');document.body.style.overflow='';}
function switchTab(tab){
  document.querySelectorAll('.watch-tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
  if(tab==='israel')renderPresetList('israelList',ISRAEL_STOCKS);
  else if(tab==='us')renderPresetList('usList',US_STOCKS);
}
function analyzeFromWatch(sym){closeWatchPanel();document.getElementById('stockInput').value=sym;analyzeStock(sym);window.scrollTo({top:0,behavior:'smooth'});}

/* Analyze All */
var analyzeAllRunning=false;
async function analyzeAllWatchlist(){
  var list=loadWatchlist();if(!list.length||analyzeAllRunning)return;
  analyzeAllRunning=true;
  var wrap=document.getElementById('allResultsWrap');wrap.style.display='block';wrap.innerHTML='';
  document.getElementById('btnAnalyzeAll').disabled=true;
  list.forEach(function(sym){
    var row=document.createElement('div');row.className='all-result-row';row.id='allrow-'+sym;
    row.innerHTML='<div class="all-result-sym">'+sym+'</div><div class="all-result-loading" id="allstat-'+sym+'">...</div>';
    wrap.appendChild(row);
  });
  for(var j=0;j<list.length;j++){
    var s=list[j];
    try{
      var r=await fetchAnalysis(s);
      cacheAnalysis(s,r);
      var statEl=document.getElementById('allstat-'+s);var rowEl=document.getElementById('allrow-'+s);
      if(statEl&&r){
        var recKey=r.recommendation;
        var color=recKey==='BUY'?'var(--green)':recKey==='SELL'?'var(--red)':'var(--gold)';
        var recTxt=recKey==='BUY'?T('recBuy'):recKey==='SELL'?T('recSell'):T('recHold');
        statEl.className='all-result-rec';statEl.style.color=color;statEl.textContent=recTxt+' '+r.confidenceScore+'%';
        if(r.currentPrice){var pr=document.createElement('div');pr.className='all-result-conf';pr.textContent=r.currentPrice;rowEl.appendChild(pr);}
        (function(sym2,res){rowEl.onclick=function(){closeWatchPanel();renderResult(res,sym2);document.getElementById('stockInput').value=sym2;window.scrollTo({top:0,behavior:'smooth'});};})(s,r);
      }
    }catch(e){var se=document.getElementById('allstat-'+s);if(se){se.textContent='ERR';se.style.color='var(--red)';}}
  }
  analyzeAllRunning=false;document.getElementById('btnAnalyzeAll').disabled=false;
  renderWatchlist();
}

/* Export/Import */
function exportWatchlist(){
  var data=JSON.stringify({stockai_watchlist:loadWatchlist(),exported:new Date().toISOString()},null,2);
  var blob=new Blob([data],{type:'application/json'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='stockai-watchlist.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToastMsg(T('backupExport')+' ✓');
}
function importWatchlist(){document.getElementById('importFileInput').click();}
function handleImport(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);var imported=data.stockai_watchlist||data;
      if(Array.isArray(imported)){var ex=loadWatchlist();imported.forEach(function(s){if(ex.indexOf(s)===-1)ex.push(s);});saveWatchlist(ex);renderWatchlist();showToastMsg(T('backupImport')+' ✓');}
    }catch(err){showToastMsg('Error reading file');}
  };reader.readAsText(file);e.target.value='';
}

/* ══════════════════════════════════════════════════
   ANALYSIS CACHE — stale detection
══════════════════════════════════════════════════ */
function getAnalysisCache(){try{return JSON.parse(localStorage.getItem('stockai_cache'))||{};}catch(e){return{};}}
function saveAnalysisCache(cache){localStorage.setItem('stockai_cache',JSON.stringify(cache));}
function cacheAnalysis(sym,result){
  var cache=getAnalysisCache();
  cache[sym]={result:result,ts:Date.now()};
  var keys=Object.keys(cache);
  if(keys.length>20)delete cache[keys[0]];
  saveAnalysisCache(cache);
}
function formatAge(ts){
  var mins=Math.floor((Date.now()-ts)/60000);
  if(mins<1)return '<1min';if(mins<60)return mins+'min';
  var hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h';
  return Math.floor(hrs/24)+'d';
}
function isStale(sym){
  var cache=getAnalysisCache();var entry=cache[sym];
  if(!entry)return false;
  return(Date.now()-entry.ts)>2*60*60*1000;
}
function showStaleBar(sym,ts){
  var bar=document.getElementById('staleBar');
  document.getElementById('staleText').textContent=T('staleMsg').replace('{ago}',formatAge(ts));
  bar.classList.add('visible');
}
function hideStaleBar(){document.getElementById('staleBar').classList.remove('visible');}
function refreshAnalysis(){var sym=document.getElementById('rSym').textContent;if(sym)analyzeStock(sym);}

/* ══════════════════════════════════════════════════
   CORE AI FETCH
══════════════════════════════════════════════════ */
var analysisHistory=[];
var currentSymbol='';
function quickAnalyze(sym){document.getElementById('stockInput').value=sym;analyzeStock(sym);}

async function analyzeStock(forceSym){
  var symbol=forceSym||(document.getElementById('stockInput').value.trim().toUpperCase());
  if(!symbol)return;
  var cfg=loadAIConfig();
  if(!cfg.provider){showError(T('errNoAI'));openSetup();return;}
  currentSymbol=symbol;
  setLoading(true,symbol);hideStaleBar();
  try{
    var result=await fetchAnalysis(symbol);
    cacheAnalysis(symbol,result);
    renderResult(result,symbol);
    addToHistory(symbol,result);
    if(isStale(symbol)){var e=getAnalysisCache()[symbol];if(e)showStaleBar(symbol,e.ts);}
  }catch(err){showError(T('errGeneral')+': '+err.message);}
  finally{setLoading(false,symbol);}
}

async function fetchAnalysis(symbol){
  var cfg=loadAIConfig();
  if(!cfg.provider)throw new Error('No AI provider configured');
  if(cfg.provider==='claude')return await fetchClaude(symbol,cfg.claudeKey);
  if(cfg.provider==='openai')return await fetchOpenAI(symbol,cfg.openaiKey,'https://api.openai.com/v1/chat/completions','gpt-4o-mini');
  if(cfg.provider==='gemini')return await fetchGemini(symbol,cfg.geminiKey);
  if(cfg.provider==='device'){
    var base=cfg.deviceUrl||'http://localhost:11434/v1';
    var ep=base.replace(/\/+$/,'')+'/chat/completions';
    return await fetchOpenAI(symbol,'none',ep,'llama3');
  }
  if(cfg.provider==='custom'){
    var ep2=cfg.customUrl||'';
    return await fetchOpenAI(symbol,cfg.customKey||'none',ep2,'gpt-4o-mini');
  }
  throw new Error('Unknown AI provider');
}

async function fetchClaude(symbol,apiKey){
  if(!apiKey)throw new Error('Claude API key not set');
  var body={model:'claude-sonnet-4-20250514',max_tokens:3000,system:AI_SYSTEM,
    tools:[{type:'web_search_20250305',name:'web_search'}],
    messages:[{role:'user',content:'Search the web for current stock data and analyze: '+symbol+'. Return ONLY the JSON object as specified in the system prompt.'}]
  };
  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  });
  if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||'HTTP '+res.status);}
  var data=await res.json();
  // Handle tool use (web search)
  if(data.stop_reason==='tool_use'){
    var toolBlocks=data.content.filter(function(b){return b.type==='tool_use';});
    var toolResults=toolBlocks.map(function(b){
      return{type:'tool_result',tool_use_id:b.id,content:'Web search completed for: '+(b.input&&b.input.query?b.input.query:symbol)+'. Please use your knowledge to provide the analysis.'};
    });
    var res2=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,system:AI_SYSTEM,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[
          {role:'user',content:'Analyze stock '+symbol+'. Return ONLY the JSON.'},
          {role:'assistant',content:data.content},
          {role:'user',content:toolResults}
        ]})
    });
    var d2=await res2.json();
    var textBlocks=(d2.content||[]).filter(function(b){return b.type==='text';});
    return parseAIResponse(textBlocks.map(function(b){return b.text;}).join('\n'));
  }
  var textBlocks2=(data.content||[]).filter(function(b){return b.type==='text';});
  return parseAIResponse(textBlocks2.map(function(b){return b.text;}).join('\n'));
}

async function fetchOpenAI(symbol,apiKey,endpoint,model){
  if(!endpoint)throw new Error('No API endpoint configured');
  var headers={'Content-Type':'application/json'};
  if(apiKey&&apiKey!=='none')headers['Authorization']='Bearer '+apiKey;
  var res=await fetch(endpoint,{
    method:'POST',headers:headers,
    body:JSON.stringify({model:model,max_tokens:2000,
      messages:[{role:'system',content:AI_SYSTEM},{role:'user',content:'Analyze stock '+symbol+'. Return ONLY the JSON object, no other text.'}]})
  });
  if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||'HTTP '+res.status);}
  var data=await res.json();
  var text=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
  return parseAIResponse(text);
}

async function fetchGemini(symbol,apiKey){
  if(!apiKey)throw new Error('Gemini API key not set');
  var url='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+apiKey;
  var res=await fetch(url,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:AI_SYSTEM+'\n\nNow analyze stock: '+symbol+'. Return ONLY the JSON object, absolutely no other text or formatting.'}]}],
      generationConfig:{temperature:0.3,maxOutputTokens:2000}})
  });
  if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||'HTTP '+res.status);}
  var data=await res.json();
  var text=(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||'';
  return parseAIResponse(text);
}

function parseAIResponse(text){
  if(!text)throw new Error('Empty response from AI');
  var cleaned=text.replace(/```json|```/g,'').trim();
  // Find first { to last }
  var start=cleaned.indexOf('{');var end=cleaned.lastIndexOf('}');
  if(start===-1||end===-1)throw new Error('No JSON found in response');
  return JSON.parse(cleaned.substring(start,end+1));
}

/* ══════════════════════════════════════════════════
   RENDER RESULT
══════════════════════════════════════════════════ */
function setLoading(on,sym){
  document.getElementById('loadingBox').classList.toggle('visible',on);
  document.getElementById('errorBox').classList.remove('visible');
  if(on)document.getElementById('resultCard').classList.remove('visible');
  if(on)document.getElementById('loadingSym').textContent=sym||'';
  var btn=document.getElementById('btnAnalyze');
  btn.disabled=on;btn.setAttribute('data-t',on?'btnAnalyzing':'btnAnalyze');
  renderText();
}
function showError(msg){
  document.getElementById('loadingBox').classList.remove('visible');
  var el=document.getElementById('errorBox');el.textContent=msg;el.classList.add('visible');
}

function renderResult(r,symbol){
  if(!r)return;
  document.getElementById('rSym').textContent=r.symbol||symbol||'';
  document.getElementById('rName').textContent=r.companyName||'';
  document.getElementById('rPrice').textContent=r.currentPrice||'—';
  document.getElementById('rTarget').textContent=r.priceTarget||'—';
  document.getElementById('rAnalyst').textContent=r.analystRating||'—';
  document.getElementById('rSummary').textContent=r.summary||'';
  var conf=parseInt(r.confidenceScore)||0;
  document.getElementById('rConfNum').textContent=conf+'% — '+getConfLabel(conf);
  document.getElementById('rFund').textContent=(parseInt(r.fundamentalScore)||0)+'/100';
  setTimeout(function(){document.getElementById('rConfFill').style.width=conf+'%';},120);
  // Recommendation badge
  var recKey=(r.recommendation||'HOLD').toUpperCase();
  var recText=recKey==='BUY'?T('recBuy'):recKey==='SELL'?T('recSell'):T('recHold');
  var recPfx=recKey==='BUY'?'▲ ':recKey==='SELL'?'▼ ':'◼ ';
  var recEl=document.getElementById('rRec');recEl.textContent=recPfx+recText;
  recEl.className='rec-badge '+(recKey==='BUY'?'rec-buy':recKey==='SELL'?'rec-sell':'rec-hold');
  // Risk
  var riskMap={LOW:{t:T('riskLow'),c:'var(--green)'},MEDIUM:{t:T('riskMed'),c:'var(--yellow)'},HIGH:{t:T('riskHigh'),c:'var(--red)'}};
  var rd=riskMap[(r.riskLevel||'').toUpperCase()]||{t:r.riskLevel||'—',c:'var(--text)'};
  var rEl=document.getElementById('rRisk');rEl.textContent=rd.t;rEl.style.color=rd.c;
  // Social sentiment
  var socMap={POSITIVE:{t:T('sentPos'),c:'var(--green)'},NEUTRAL:{t:T('sentNeu'),c:'var(--yellow)'},NEGATIVE:{t:T('sentNeg'),c:'var(--red)'}};
  var sd=socMap[(r.socialSentiment||'').toUpperCase()]||{t:r.socialSentiment||'—',c:'var(--text)'};
  var sEl=document.getElementById('rSocial');sEl.textContent=sd.t;sEl.style.color=sd.c;
  // Technical signal
  var techMap={UP:{t:T('techUp'),c:'var(--green)'},DOWN:{t:T('techDown'),c:'var(--red)'},NEUTRAL:{t:T('techNeu'),c:'var(--yellow)'}};
  var td=techMap[(r.technicalSignal||'').toUpperCase()]||{t:r.technicalSignal||'—',c:'var(--text)'};
  var tEl=document.getElementById('rTech');tEl.textContent=td.t;tEl.style.color=td.c;
  // Bull/Bear factors
  var bullEl=document.getElementById('rBull');bullEl.innerHTML='';
  (r.bullishFactors||[]).forEach(function(f){var d=document.createElement('div');d.className='factor-item';d.innerHTML='<div class="factor-dot" style="background:var(--green)"></div><span>'+escHtml(f)+'</span>';bullEl.appendChild(d);});
  var bearEl=document.getElementById('rBear');bearEl.innerHTML='';
  (r.bearishFactors||[]).forEach(function(f){var d=document.createElement('div');d.className='factor-item';d.innerHTML='<div class="factor-dot" style="background:var(--red)"></div><span>'+escHtml(f)+'</span>';bearEl.appendChild(d);});
  // Sources
  var srcEl=document.getElementById('rSources');srcEl.innerHTML='';
  (r.sources||[]).forEach(function(s){var sp=document.createElement('span');sp.className='source-tag';sp.textContent=s;srcEl.appendChild(sp);});
  document.getElementById('resultCard').classList.add('visible');
  currentSymbol=r.symbol||symbol;
  updateAddWatchBtn();
  // Check if stale
  var cache=getAnalysisCache();var entry=cache[currentSymbol];
  if(entry&&isStale(currentSymbol))showStaleBar(currentSymbol,entry.ts);
  else hideStaleBar();
}

function getConfLabel(s){if(s>=75)return T('confHigh');if(s>=50)return T('confMed');return T('confLow');}

function addToHistory(sym,result){
  analysisHistory.unshift({symbol:sym,result:result,time:new Date().toLocaleTimeString()});
  if(analysisHistory.length>5)analysisHistory.pop();
  renderHistory();
}
function renderHistory(){
  var wrap=document.getElementById('historyWrap');var list=document.getElementById('historyItems');
  if(!analysisHistory.length){wrap.style.display='none';return;}
  wrap.style.display='block';list.innerHTML='';
  analysisHistory.forEach(function(h){
    var recKey=(h.result.recommendation||'HOLD').toUpperCase();
    var color=recKey==='BUY'?'var(--green)':recKey==='SELL'?'var(--red)':'var(--gold)';
    var recText=recKey==='BUY'?T('recBuy'):recKey==='SELL'?T('recSell'):T('recHold');
    var el=document.createElement('div');el.className='hist-item';
    el.innerHTML='<div class="hist-sym" style="color:'+color+'">'+escHtml(h.symbol)+'</div>'
      +'<div class="hist-rec" style="color:'+color+'">'+escHtml(recText)+'</div>'
      +'<div class="hist-time">'+h.time+'</div>';
    el.onclick=function(){renderResult(h.result,h.symbol);document.getElementById('stockInput').value=h.symbol;};
    list.appendChild(el);
  });
}

function shareApp(){
  var url='https://barakaflalo.github.io/appnest';
  if(navigator.share){navigator.share({title:T('shareTitle'),text:T('shareText'),url:url}).catch(function(){});return;}
  var txt=T('shareText')+'\n'+url;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){showToastMsg('✓ Copied!');});}
  else{var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);showToastMsg('✓ Copied!');}
}
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem('pwa_dismissed')){
    document.getElementById('pwaBanner').classList.add('visible');
    document.getElementById('pwaBannerTitle').textContent=T('pwaTitle');
    document.getElementById('pwaBannerText').textContent=T('pwaText');
  }
});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('pwaBanner').classList.remove('visible');});}
function dismissPWA(){localStorage.setItem('pwa_dismissed','1');document.getElementById('pwaBanner').classList.remove('visible');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToastMsg(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}

  applyTheme();
  setLang(curLang);

  setTimeout(function(){
    var splash=document.getElementById('splash');

    if(!loadAIConfig().provider){
      setTimeout(function(){openSetup();},400);
    }
  },1800);
};
