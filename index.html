<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockAI — Smart Stock Analysis</title>
<meta name="description" content="AI-powered stock analysis for US & Israel markets">
<meta name="theme-color" content="#0e0e0e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+Hebrew:wght@300;400;700&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c9a84c; --gold-light:#e8c96a; --gold-dim:#8a6d2f;
  --black:#050505; --black2:#0e0e0e; --black3:#161616; --black4:#1e1e1e;
  --border:#2a2416; --text:#d4c5a0; --text-dim:#6b5e3e; --text-muted:#3a3020;
  --green:#4caf72; --red:#cf4a4a; --yellow:#c9a84c;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:'Noto Sans Hebrew',sans-serif;min-height:100vh;overflow-x:hidden;}
body.rtl{direction:rtl;text-align:right;}
body.ltr{direction:ltr;text-align:left;}
body.ar-lang{font-family:'Noto Sans Arabic',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

/* TICKER */
.ticker-wrap{background:var(--black2);border-bottom:1px solid var(--border);overflow:hidden;height:32px;display:flex;align-items:center;position:relative;z-index:10;}
.ticker-track{display:flex;gap:0;animation:ticker 40s linear infinite;white-space:nowrap;}
.ticker-item{padding:0 28px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--gold-dim);letter-spacing:1px;}
.ticker-item span{color:var(--green);margin-right:4px;}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
.site-header{background:linear-gradient(180deg,var(--black2) 0%,var(--black) 100%);border-bottom:1px solid var(--border);padding:28px 24px 20px;position:relative;z-index:10;}
.header-inner{max-width:880px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.brand{display:flex;flex-direction:column;gap:6px;}
.brand-tag{font-size:10px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.brand-name{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,44px);font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px;}
.brand-sub{font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:.5px;}
.header-right{display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
.lang-selector{display:flex;gap:6px;flex-wrap:wrap;}
.lang-btn{background:var(--black3);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;text-transform:uppercase;}
.lang-btn:hover,.lang-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1408;}
.btn-watchlist{background:var(--black3);border:1px solid var(--gold-dim);color:var(--gold);padding:7px 16px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-watchlist:hover{background:#1a1408;border-color:var(--gold);}
.watchlist-count{background:var(--gold);color:#000;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;}

/* MAIN */
.main{max-width:880px;margin:0 auto;padding:36px 20px 60px;position:relative;z-index:10;}

/* SEARCH */
.search-card{background:var(--black2);border:1px solid var(--border);border-radius:4px;padding:28px;margin-bottom:32px;position:relative;overflow:hidden;}
.search-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.search-card::after{content:'';position:absolute;bottom:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#c9a84c08 0%,transparent 70%);pointer-events:none;}
.search-label{font-size:10px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:16px;display:block;font-family:'IBM Plex Mono',monospace;}
.search-row{display:flex;gap:10px;}
.search-input{flex:1;background:var(--black);border:1px solid var(--border);padding:14px 18px;font-size:20px;font-family:'IBM Plex Mono',monospace;color:#fff;letter-spacing:3px;text-transform:uppercase;outline:none;border-radius:2px;direction:ltr;text-align:left;transition:border-color .2s,box-shadow .2s;}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-dim);}
.search-input::placeholder{color:var(--text-muted);letter-spacing:2px;font-size:14px;}
.btn-analyze{background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;padding:14px 28px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:2px;color:#000;cursor:pointer;text-transform:uppercase;border-radius:2px;transition:opacity .2s,transform .2s;white-space:nowrap;}
.btn-analyze:hover{opacity:.85;transform:translateY(-1px);}
.btn-analyze:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.quick-picks{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;}
.pick-btn{background:var(--black);border:1px solid var(--text-muted);color:var(--text-dim);padding:5px 13px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .15s;}
.pick-btn:hover{border-color:var(--gold-dim);color:var(--gold);}

/* LOADING */
.loading-box{background:var(--black2);border:1px solid var(--border);border-radius:4px;padding:56px 32px;text-align:center;display:none;}
.loading-box.visible{display:block;}
.spinner{width:44px;height:44px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-sym{font-size:22px;font-family:'IBM Plex Mono',monospace;color:var(--gold);letter-spacing:4px;margin-bottom:8px;}
.loading-steps{margin-top:20px;display:flex;flex-direction:column;gap:7px;align-items:center;}
.loading-step{font-size:12px;color:var(--text-muted);animation:blink 2.5s ease-in-out infinite;letter-spacing:.3px;}
.loading-step:nth-child(2){animation-delay:.6s;}
.loading-step:nth-child(3){animation-delay:1.2s;}
.loading-step:nth-child(4){animation-delay:1.8s;}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* ERROR */
.error-box{background:#160808;border:1px solid #3d1010;border-radius:4px;padding:20px 24px;color:#e05555;font-size:13px;display:none;line-height:1.6;}
.error-box.visible{display:block;}

/* RESULT CARD */
.result-card{background:var(--black2);border:1px solid var(--border);border-radius:4px;overflow:hidden;display:none;animation:fadeUp .4s ease;}
.result-card.visible{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.result-header{display:flex;justify-content:space-between;align-items:center;padding:28px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:16px;background:linear-gradient(135deg,var(--black2),#110f08);}
.stock-id{display:flex;flex-direction:column;gap:4px;}
.stock-sym{font-size:38px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#fff;letter-spacing:3px;}
.stock-fullname{font-size:13px;color:var(--text-dim);}
.result-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.rec-badge{padding:12px 26px;border-radius:2px;font-size:18px;font-weight:700;border:2px solid;letter-spacing:1px;}
.rec-buy{color:var(--green);border-color:var(--green);background:#0a1f10;}
.rec-sell{color:var(--red);border-color:var(--red);background:#1f0a0a;}
.rec-hold{color:var(--gold);border-color:var(--gold);background:#1a1408;}
.btn-add-watch{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .2s;letter-spacing:1px;}
.btn-add-watch:hover{border-color:var(--gold-dim);color:var(--gold);}
.btn-add-watch.added{border-color:var(--green);color:var(--green);}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.metric-cell{background:var(--black2);padding:18px 22px;}
.metric-label{font-size:9px;letter-spacing:2.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
.metric-val{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.conf-section{padding:22px 32px;border-bottom:1px solid var(--border);}
.conf-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px;}
.conf-label{color:var(--text-dim);letter-spacing:2px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}
.conf-num{color:var(--gold);font-family:'IBM Plex Mono',monospace;font-weight:600;}
.conf-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.conf-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-light));border-radius:3px;transition:width 1.2s cubic-bezier(.22,1,.36,1);width:0;}
.body-sec{padding:24px 32px;border-bottom:1px solid var(--border);}
.sec-label{font-size:9px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;}
.summary-txt{font-size:14px;line-height:1.85;color:var(--text);}
.factors-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.factor-panel{background:var(--black2);padding:22px 26px;}
.factor-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;font-size:13px;line-height:1.55;color:var(--text);}
.factor-dot{width:5px;height:5px;border-radius:50%;margin-top:7px;flex-shrink:0;}
.signals-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--border);}
.signal-cell{background:var(--black);padding:16px 18px;text-align:center;}
.signal-lbl{font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:7px;font-family:'IBM Plex Mono',monospace;}
.signal-val{font-size:13px;font-weight:700;}
.sources-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.source-tag{background:var(--black);border:1px solid var(--text-muted);padding:3px 11px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);border-radius:2px;}

/* HISTORY */
.history-wrap{margin-top:28px;}
.history-title{font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace;}
.history-items{display:flex;flex-wrap:wrap;gap:8px;}
.hist-item{background:var(--black2);border:1px solid var(--border);padding:9px 14px;cursor:pointer;border-radius:2px;transition:border-color .2s;display:flex;flex-direction:column;gap:2px;}
.hist-item:hover{border-color:var(--gold-dim);}
.hist-sym{font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.hist-rec{font-size:10px;}
.hist-time{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}

/* SHARE */
.share-section{margin-top:36px;background:var(--black2);border:1px solid var(--border);border-radius:4px;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;position:relative;overflow:hidden;}
.share-section::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.share-left{display:flex;flex-direction:column;gap:4px;}
.share-label{font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.share-btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn-share{background:linear-gradient(135deg,var(--gold-dim),#5a4520);border:1px solid var(--gold-dim);color:var(--gold-light);padding:10px 20px;font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.btn-share:hover{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;}
.btn-more-apps{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:10px 20px;font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;}
.btn-more-apps:hover{border-color:var(--gold-dim);color:var(--gold);}

/* DISCLAIMER */
.disclaimer{margin-top:48px;border-top:1px solid var(--border);padding-top:20px;font-size:10px;color:var(--text-muted);line-height:1.8;text-align:center;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black2);border:1px solid var(--gold-dim);color:var(--gold);padding:10px 22px;font-size:12px;font-family:'IBM Plex Mono',monospace;border-radius:2px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══════════════════════════════════════
   WATCHLIST PANEL (slide-in drawer)
══════════════════════════════════════ */
.watch-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.watch-overlay.open{opacity:1;pointer-events:all;}
.watch-panel{position:fixed;top:0;right:0;height:100%;width:min(420px,100vw);background:var(--black2);border-left:1px solid var(--border);z-index:201;transform:translateX(110%);transition:transform .35s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow:hidden;}
body.ltr .watch-panel{right:auto;left:0;border-left:none;border-right:1px solid var(--border);transform:translateX(-110%);}
.watch-panel.open{transform:translateX(0);}
.watch-panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,var(--black3),var(--black2));flex-shrink:0;}
.watch-panel-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.watch-close{background:transparent;border:1px solid var(--border);color:var(--text-dim);width:32px;height:32px;border-radius:2px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.watch-close:hover{border-color:var(--gold-dim);color:var(--gold);}

/* Tabs */
.watch-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.watch-tab{flex:1;padding:12px 8px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;text-align:center;}
.watch-tab:hover{color:var(--text-dim);}
.watch-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:#0d0d0a;}

/* Tab content */
.watch-body{flex:1;overflow-y:auto;padding:0;}
.watch-body::-webkit-scrollbar{width:4px;}
.watch-body::-webkit-scrollbar-track{background:var(--black);}
.watch-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.tab-pane{display:none;padding:20px;}
.tab-pane.active{display:block;}

/* My watchlist tab */
.watch-add-row{display:flex;gap:8px;margin-bottom:16px;}
.watch-add-input{flex:1;background:var(--black);border:1px solid var(--border);padding:10px 14px;font-size:15px;font-family:'IBM Plex Mono',monospace;color:#fff;letter-spacing:2px;text-transform:uppercase;outline:none;border-radius:2px;direction:ltr;}
.watch-add-input:focus{border-color:var(--gold);}
.watch-add-btn{background:var(--gold-dim);border:none;color:#000;padding:10px 16px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:700;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.watch-add-btn:hover{background:var(--gold);}
.watch-items-list{display:flex;flex-direction:column;gap:6px;}
.watch-item{background:var(--black);border:1px solid var(--border);border-radius:2px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:border-color .15s;}
.watch-item:hover{border-color:var(--gold-dim);}
.watch-item-sym{font-size:15px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#fff;cursor:pointer;flex:1;}
.watch-item-sym:hover{color:var(--gold);}
.watch-item-actions{display:flex;gap:6px;}
.btn-analyze-watch{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:4px 11px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .15s;letter-spacing:1px;}
.btn-analyze-watch:hover{background:var(--gold-dim);color:#000;}
.btn-remove-watch{background:transparent;border:1px solid #3d1a1a;color:var(--red);width:26px;height:26px;font-size:14px;cursor:pointer;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.btn-remove-watch:hover{background:#1f0a0a;}
.watch-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;line-height:1.8;}
.watch-empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}

/* Analyze all button */
.btn-analyze-all{width:100%;background:linear-gradient(135deg,var(--gold-dim),#3a2a10);border:1px solid var(--gold-dim);color:var(--gold-light);padding:11px;font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:all .2s;margin-bottom:14px;}
.btn-analyze-all:hover{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;}
.btn-analyze-all:disabled{opacity:.4;cursor:not-allowed;}

/* Backup/Restore */
.watch-backup-row{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.btn-backup{flex:1;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .2s;text-align:center;}
.btn-backup:hover{border-color:var(--gold-dim);color:var(--gold);}

/* Preset lists (Israel / US) */
.preset-grid{display:flex;flex-direction:column;gap:6px;}
.preset-item{background:var(--black);border:1px solid var(--border);border-radius:2px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:border-color .15s;}
.preset-item:hover{border-color:var(--gold-dim);}
.preset-sym{font-size:14px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#fff;}
.preset-name{font-size:11px;color:var(--text-dim);flex:1;margin:0 10px;}
.preset-actions{display:flex;gap:6px;}
.btn-preset-analyze{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:4px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .15s;}
.btn-preset-analyze:hover{background:var(--gold-dim);color:#000;}
.btn-preset-add{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border-radius:2px;transition:all .15s;}
.btn-preset-add:hover{border-color:var(--green);color:var(--green);}
.btn-preset-add.added{border-color:var(--green);color:var(--green);}

/* Analyze-All results table */
.all-results-wrap{margin-top:12px;}
.all-result-row{background:var(--black);border:1px solid var(--border);border-radius:2px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;cursor:pointer;transition:border-color .15s;}
.all-result-row:hover{border-color:var(--gold-dim);}
.all-result-sym{font-size:14px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:#fff;min-width:60px;}
.all-result-rec{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.all-result-conf{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
.all-result-loading{font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;animation:blink 1.5s ease-in-out infinite;}

/* PWA install banner */
.pwa-banner{background:linear-gradient(135deg,#1a1408,#0e0e0e);border:1px solid var(--gold-dim);border-radius:4px;padding:14px 18px;margin-bottom:20px;display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.pwa-banner.visible{display:flex;}
.pwa-banner-text{font-size:12px;color:var(--text);line-height:1.5;}

function T(k){return(LANG[curLang]&&LANG[curLang][k])||(LANG.en&&LANG.en[k])||k;}

function setLang(lang){
  curLang=lang;
  localStorage.setItem('stockai_lang',lang);
  var body=document.getElementById('appBody');
  if(lang==='he'||lang==='ar'){body.className='rtl';document.documentElement.setAttribute('dir','rtl');}
  else{body.className='ltr';document.documentElement.setAttribute('dir','ltr');}
  if(lang==='ar')body.classList.add('ar-lang');
  document.documentElement.setAttribute('lang',lang);
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active');});
  var ab=document.getElementById('lang-'+lang);
  if(ab)ab.classList.add('active');
  renderText();
  renderWatchlist();
}
function renderText(){
  document.querySelectorAll('[data-t]').forEach(function(el){el.textContent=T(el.getAttribute('data-t'));});
  document.querySelectorAll('[data-tp]').forEach(function(el){el.placeholder=T(el.getAttribute('data-tp'));});
  var d=document.getElementById('disclaimer');
  if(d)d.textContent=T('disclaimer');
  var wt=document.getElementById('watchPanelTitle');
  if(wt)wt.textContent=T('watchPanelTitle');
}

/* ══════════════════════════════════════
   WATCHLIST — localStorage
══════════════════════════════════════ */
function loadWatchlist(){
  try{return JSON.parse(localStorage.getItem('stockai_watchlist'))||[];}catch(e){return[];}
}
function saveWatchlist(list){
  localStorage.setItem('stockai_watchlist',JSON.stringify(list));
  updateWatchCount();
}
function updateWatchCount(){
  var c=loadWatchlist().length;
  document.getElementById('watchCount').textContent=c;
}
function isInWatchlist(sym){return loadWatchlist().indexOf(sym)!==-1;}

function addToWatchlist(sym){
  var s=sym||(document.getElementById('watchAddInput').value.trim().toUpperCase());
  if(!s)return;
  var list=loadWatchlist();
  if(list.indexOf(s)===-1){list.push(s);saveWatchlist(list);}
  document.getElementById('watchAddInput').value='';
  renderWatchlist();
  updateAddWatchBtn();
  showToastMsg('✓ '+s);
}
function removeFromWatchlist(sym){
  var list=loadWatchlist().filter(function(x){return x!==sym;});
  saveWatchlist(list);
  renderWatchlist();
  updateAddWatchBtn();
}
function toggleWatchFromResult(){
  var sym=document.getElementById('rSym').textContent;
  if(!sym)return;
  if(isInWatchlist(sym))removeFromWatchlist(sym);
  else addToWatchlist(sym);
  updateAddWatchBtn();
}
function updateAddWatchBtn(){
  var sym=document.getElementById('rSym').textContent;
  var btn=document.getElementById('btnAddWatch');
  if(!sym||!btn)return;
  if(isInWatchlist(sym)){btn.textContent=T('addedToWatch');btn.className='btn-add-watch added';}
  else{btn.textContent=T('addToWatch');btn.className='btn-add-watch';}
}

function renderWatchlist(){
  var list=loadWatchlist();
  var el=document.getElementById('watchItemsList');
  var allWrap=document.getElementById('allResultsWrap');
  // Update tab data-t texts
  document.querySelectorAll('[data-t]').forEach(function(e){e.textContent=T(e.getAttribute('data-t'));});
  document.querySelectorAll('[data-tp]').forEach(function(e){e.placeholder=T(e.getAttribute('data-tp'));});
  if(!list.length){
    el.innerHTML='<div class="watch-empty"><div class="watch-empty-icon">'+T('watchEmptyIcon')+'</div>'+T('watchEmpty').replace('\n','<br>')+'</div>';
    document.getElementById('btnAnalyzeAll').disabled=true;
    return;
  }
  document.getElementById('btnAnalyzeAll').disabled=false;
  el.innerHTML='';
  list.forEach(function(sym){
    var d=document.createElement('div');d.className='watch-item';
    d.innerHTML='<div class="watch-item-sym" onclick="analyzeFromWatch(\''+sym+'\')">'
      +sym+'</div><div class="watch-item-actions">'
      +'<button class="btn-analyze-watch" onclick="analyzeFromWatch(\''+sym+'\')">'
      +T('analyzeBtn')+'</button>'
      +'<button class="btn-remove-watch" onclick="removeFromWatchlist(\''+sym+'\')">✕</button>'
      +'</div>';
    el.appendChild(d);
  });
  // render preset lists
  renderPresetList('israelList',ISRAEL_STOCKS);
  renderPresetList('usList',US_STOCKS);
}

function renderPresetList(elId,stocks){
  var el=document.getElementById(elId);
  var list=loadWatchlist();
  el.innerHTML='';
  stocks.forEach(function(s){
    var inList=list.indexOf(s.sym)!==-1;
    var d=document.createElement('div');d.className='preset-item';
    d.innerHTML='<div class="preset-sym">'+s.sym+'</div>'
      +'<div class="preset-name">'+s.name+'</div>'
      +'<div class="preset-actions">'
      +'<button class="btn-preset-analyze" onclick="analyzeFromWatch(\''+s.sym+'\')">'
      +T('analyzeBtn')+'</button>'
      +'<button class="btn-preset-add'+(inList?' added':'')+'" id="padd-'+s.sym+'" onclick="togglePreset(\''+s.sym+'\')">'
      +(inList?T('addedToWatch'):T('addToWatch'))+'</button>'
      +'</div>';
    el.appendChild(d);
  });
}
function togglePreset(sym){
  if(isInWatchlist(sym))removeFromWatchlist(sym);
  else addToWatchlist(sym);
  renderWatchlist();
}

/* ══════════════════════════════════════
   WATCH PANEL UI
══════════════════════════════════════ */
var currentTab='mine';
function openWatchPanel(){
  renderWatchlist();
  document.getElementById('watchPanel').classList.add('open');
  document.getElementById('watchOverlay').classList.add('open');

}

function switchTab(tab){

function analyzeFromWatch(sym){

/* ══════════════════════════════════════
   ANALYZE ALL
══════════════════════════════════════ */
var analyzeAllRunning=false;
async function analyzeAllWatchlist(){
  var list=loadWatchlist();
  if(!list.length||analyzeAllRunning)return;
  analyzeAllRunning=true;
  var wrap=document.getElementById('allResultsWrap');
  wrap.style.display='block';
  wrap.innerHTML='';
  document.getElementById('btnAnalyzeAll').disabled=true;
  for(var i=0;i<list.length;i++){
    var sym=list[i];
    var row=document.createElement('div');row.className='all-result-row';row.id='allrow-'+sym;
    row.innerHTML='<div class="all-result-sym">'+sym+'</div>'
      +'<div class="all-result-loading" id="allstat-'+sym+'">...</div>';
    wrap.appendChild(row);
  }
  for(var j=0;j<list.length;j++){
    var s=list[j];
    try{
      var r=await fetchAnalysis(s);
      var statEl=document.getElementById('allstat-'+s);
      var rowEl=document.getElementById('allrow-'+s);
      if(statEl&&r){
        var recKey=r.recommendation;
        var color=recKey==='BUY'?'var(--green)':recKey==='SELL'?'var(--red)':'var(--gold)';
        var recTxt=recKey==='BUY'?T('recBuy'):recKey==='SELL'?T('recSell'):T('recHold');
        statEl.className='all-result-rec';
        statEl.style.color=color;
        statEl.textContent=recTxt+' — '+r.confidenceScore+'%';
        var confEl=document.createElement('div');confEl.className='all-result-conf';confEl.textContent=r.currentPrice||'';
        rowEl.appendChild(confEl);
        rowEl.onclick=(function(sym,res){return function(){closeWatchPanel();renderResult(res,sym);document.getElementById('stockInput').value=sym;window.scrollTo({top:0,behavior:'smooth'});}})(s,r);
      }
    }catch(e){
      var se=document.getElementById('allstat-'+s);
      if(se){se.textContent='ERR';se.style.color='var(--red)';}
    }
  }
  analyzeAllRunning=false;
  document.getElementById('btnAnalyzeAll').disabled=false;
}

/* ══════════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════════ */
function exportWatchlist(){
  var list=loadWatchlist();
  var data=JSON.stringify({stockai_watchlist:list,exported:new Date().toISOString()},null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='stockai-watchlist.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToastMsg(T('backupExport')+' ✓');
}
function importWatchlist(){document.getElementById('importFileInput').click();}
function handleImport(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      var imported=data.stockai_watchlist||data;
      if(Array.isArray(imported)){
        var existing=loadWatchlist();
        imported.forEach(function(s){if(existing.indexOf(s)===-1)existing.push(s);});
        saveWatchlist(existing);
        renderWatchlist();
        showToastMsg(T('backupImport')+' ✓ ('+imported.length+')');
      }
    }catch(err){showToastMsg('Error reading file');}
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ══════════════════════════════════════
   AI ANALYSIS CORE
══════════════════════════════════════ */
var analysisHistory=[];
var currentSymbol='';

function quickAnalyze(sym){document.getElementById('stockInput').value=sym;analyzeStock(sym);}

async function analyzeStock(forceSym){
  var symbol=forceSym||(document.getElementById('stockInput').value.trim().toUpperCase());
  if(!symbol)return;
  currentSymbol=symbol;
  setLoading(true,symbol);
  try{
    var result=await fetchAnalysis(symbol);
    renderResult(result,symbol);
    addToHistory(symbol,result);
  }catch(err){
    showError(T('errGeneral')+': '+err.message);
  }finally{
    setLoading(false,symbol);
  }
}

async function fetchAnalysis(symbol){
  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:4000,system:AI_SYSTEM,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:'Search and analyze stock '+symbol+'. Return ONLY the JSON object as specified.'}]
    })
  });
  if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error((e.error&&e.error.message)||('HTTP '+res.status));}
  var data=await res.json();
  var finalContent=data.content;
  if(data.stop_reason==='tool_use'){
    var toolBlocks=data.content.filter(function(b){return b.type==='tool_use';});
    var toolResults=toolBlocks.map(function(b){return{type:'tool_result',tool_use_id:b.id,content:'Search completed for: '+(b.input&&b.input.query?b.input.query:symbol)};});
    var res2=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:4000,system:AI_SYSTEM,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[
          {role:'user',content:'Analyze stock '+symbol+'. Return ONLY the JSON object.'},
          {role:'assistant',content:data.content},
          {role:'user',content:toolResults}
        ]
      })
    });
    var data2=await res2.json();
    finalContent=data2.content;
  }
  var fullText=(finalContent||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n');
  if(!fullText)throw new Error('Empty response');
  var cleaned=fullText.replace(/```json|```/g,'').trim();
  var match=cleaned.match(/\{[\s\S]*\}/);
  if(!match)throw new Error('Could not parse JSON');
  return JSON.parse(match[0]);
}

function setLoading(on,sym){
  document.getElementById('loadingBox').classList.toggle('visible',on);
  document.getElementById('errorBox').classList.remove('visible');
  if(on){document.getElementById('resultCard').classList.remove('visible');document.getElementById('loadingSym').textContent=sym||'';}
  document.getElementById('btnAnalyze').disabled=on;
  document.getElementById('btnAnalyze').setAttribute('data-t',on?'btnAnalyzing':'btnAnalyze');
  renderText();
}
function showError(msg){var el=document.getElementById('errorBox');el.textContent=msg;el.classList.add('visible');}

function renderResult(r,symbol){
  document.getElementById('rSym').textContent=r.symbol||symbol;
  document.getElementById('rName').textContent=r.companyName||'';
  document.getElementById('rPrice').textContent=r.currentPrice||'—';
  document.getElementById('rTarget').textContent=r.priceTarget||'—';
  document.getElementById('rAnalyst').textContent=r.analystRating||'—';
  document.getElementById('rSummary').textContent=r.summary||'';
  document.getElementById('rConfNum').textContent=(r.confidenceScore||0)+'% — '+getConfLabel(r.confidenceScore);
  document.getElementById('rFund').textContent=(r.fundamentalScore||0)+'/100';
  setTimeout(function(){document.getElementById('rConfFill').style.width=(r.confidenceScore||0)+'%';},100);
  var recEl=document.getElementById('rRec');
  var recKey=r.recommendation;
  var recText=recKey==='BUY'?T('recBuy'):recKey==='SELL'?T('recSell'):T('recHold');
  var recPfx=recKey==='BUY'?'▲ ':recKey==='SELL'?'▼ ':'◼ ';
  recEl.textContent=recPfx+recText;
  recEl.className='rec-badge '+(recKey==='BUY'?'rec-buy':recKey==='SELL'?'rec-sell':'rec-hold');
  var riskMap={'LOW':{t:T('riskLow'),c:'var(--green)'},'MEDIUM':{t:T('riskMed'),c:'var(--yellow)'},'HIGH':{t:T('riskHigh'),c:'var(--red)'}};
  var rd=riskMap[r.riskLevel]||{t:r.riskLevel,c:'var(--text)'};
  document.getElementById('rRisk').textContent=rd.t;document.getElementById('rRisk').style.color=rd.c;
  var socMap={'POSITIVE':{t:T('sentPos'),c:'var(--green)'},'NEUTRAL':{t:T('sentNeu'),c:'var(--yellow)'},'NEGATIVE':{t:T('sentNeg'),c:'var(--red)'}};
  var sd=socMap[r.socialSentiment]||{t:r.socialSentiment,c:'var(--text)'};
  document.getElementById('rSocial').textContent=sd.t;document.getElementById('rSocial').style.color=sd.c;
  var techMap={'UP':{t:T('techUp'),c:'var(--green)'},'DOWN':{t:T('techDown'),c:'var(--red)'},'NEUTRAL':{t:T('techNeu'),c:'var(--yellow)'}};
  var td=techMap[r.technicalSignal]||{t:r.technicalSignal,c:'var(--text)'};
  document.getElementById('rTech').textContent=td.t;document.getElementById('rTech').style.color=td.c;
  var bullEl=document.getElementById('rBull');bullEl.innerHTML='';
  (r.bullishFactors||[]).forEach(function(f){var d=document.createElement('div');d.className='factor-item';d.innerHTML='<div class="factor-dot" style="background:var(--green)"></div><span>'+escHtml(f)+'</span>';bullEl.appendChild(d);});
  var bearEl=document.getElementById('rBear');bearEl.innerHTML='';
  (r.bearishFactors||[]).forEach(function(f){var d=document.createElement('div');d.className='factor-item';d.innerHTML='<div class="factor-dot" style="background:var(--red)"></div><span>'+escHtml(f)+'</span>';bearEl.appendChild(d);});
  var srcEl=document.getElementById('rSources');srcEl.innerHTML='';
  (r.sources||[]).forEach(function(s){var sp=document.createElement('span');sp.className='source-tag';sp.textContent=s;srcEl.appendChild(sp);});
  document.getElementById('resultCard').classList.add('visible');
  currentSymbol=r.symbol||symbol;
  updateAddWatchBtn();
}

function getConfLabel(s){if(s>=75)return T('confHigh');if(s>=50)return T('confMed');return T('confLow');}

function addToHistory(symbol,result){
  analysisHistory.unshift({symbol:symbol,result:result,time:new Date().toLocaleTimeString()});
  if(analysisHistory.length>5)analysisHistory.pop();
  renderHistory();
}
function renderHistory(){
  var wrap=document.getElementById('historyWrap');
  var list=document.getElementById('historyItems');
  if(!analysisHistory.length){wrap.style.display='none';return;}
  wrap.style.display='block';list.innerHTML='';
  analysisHistory.forEach(function(h){
    var recKey=h.result.recommendation;
    var color=recKey==='BUY'?'var(--green)':recKey==='SELL'?'var(--red)':'var(--gold)';
    var recText=recKey==='BUY'?T('recBuy'):recKey==='SELL'?T('recSell'):T('recHold');
    var el=document.createElement('div');el.className='hist-item';
    el.innerHTML='<div class="hist-sym" style="color:'+color+'">'+es
